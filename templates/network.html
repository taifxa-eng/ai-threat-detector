{% extends "base.html" %}
{% block content %}

<div class="soc-wrapper">

    <h2 class="soc-title">SOC Network Analysis Center</h2>

    <!-- STATUS CARDS -->
    <div class="soc-stats">
        <div class="soc-card-mini">
            <h4>Live Threats</h4>
            <p id="liveThreats">0</p>
        </div>

        <div class="soc-card-mini">
            <h4>Suspicious</h4>
            <p id="liveSuspicious">0</p>
        </div>

        <div class="soc-card-mini">
            <h4>Safe Events</h4>
            <p id="liveSafe">0</p>
        </div>
    </div>

    <!-- INPUT -->
    <div class="soc-input">
        <input id="ip" placeholder="IP Address" />
        <input id="behavior" placeholder="Behavior (ddos / scan / normal)" />
        <input id="packets" placeholder="Packets" />
        <button onclick="manualAnalyze()">Run Manual Test</button>
    </div>

    <!-- RESULT -->
    <div id="resultBox"></div>

    <!-- LIVE FEED -->
    <div class="soc-feed" id="feed"></div>

</div>

<script>
let stats = { safe: 0, suspicious: 0, threats: 0 };
let lastResult = null;

// ================= MANUAL =================
async function manualAnalyze(){

    const ip = document.getElementById("ip").value || "192.168.1.1";
    const behavior = document.getElementById("behavior").value || "scan";
    const packets = document.getElementById("packets").value || 500;

    const res = await fetch("/analyze-network", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ ip, behavior, packets })
    });

    const data = await res.json();

    const result = data.result || "SAFE";
    const score = data.score || 0;

    // 🔥 حفظ النتيجة
    lastResult = `
    <div style="background:#111;padding:10px;border-radius:10px;margin-top:10px">
        RESULT: ${result} | SCORE: ${score}
    </div>`;

    document.getElementById("resultBox").innerHTML = lastResult;

    addFeed(ip, behavior, packets, result, score);
    updateStats(result);
}

// ================= ADD FEED =================
function addFeed(ip, behavior, packets, result, score){

    const feed = document.getElementById("feed");

    let color = "#2ecc71";
    if(result === "MALICIOUS") color = "#ff3b3b";
    if(result === "SUSPICIOUS") color = "#ffb100";

    const card = document.createElement("div");
    card.className = "soc-event";

    card.style.borderLeft = "5px solid " + color;

    card.innerHTML = `
        <div>${ip}</div>
        <div>${behavior} | ${packets} packets</div>
        <div>Result: <b style="color:${color}">${result}</b></div>
        <div>Score: ${score}</div>
    `;

    feed.prepend(card);
}

// ================= STATS =================
function updateStats(result){
    if(result === "SAFE") stats.safe++;
    else if(result === "SUSPICIOUS") stats.suspicious++;
    else stats.threats++;

    document.getElementById("liveSafe").innerText = stats.safe;
    document.getElementById("liveSuspicious").innerText = stats.suspicious;
    document.getElementById("liveThreats").innerText = stats.threats;
}

// ================= AUTO FEED =================
async function autoFeed(){

    const res = await fetch("/api/dashboard/alerts");
    const json = await res.json();

    const alerts = json.alerts || [];

    document.getElementById("feed").innerHTML = "";

    stats = { safe: 0, suspicious: 0, threats: 0 };

    alerts.slice(0, 15).forEach(a=>{
        const result = a.result || "SAFE";
        addFeed(a.ip, a.behavior, a.packets, result, a.score);
        updateStats(result);
    });

    // 🔥 رجّع آخر نتيجة
    if(lastResult){
        document.getElementById("resultBox").innerHTML = lastResult;
    }
}

setInterval(autoFeed, 15000);
autoFeed();
</script>

<style>
.soc-wrapper{padding:20px;color:white;}
.soc-title{color:#00d4ff;margin-bottom:20px;}
.soc-stats{display:flex;gap:15px;margin-bottom:20px;}
.soc-card-mini{background:#111;padding:15px;border-radius:10px;flex:1;text-align:center;}
.soc-input input{display:block;width:100%;margin:8px 0;padding:10px;}
.soc-input button{width:100%;padding:10px;background:#00d4ff;border:none;cursor:pointer;}
.soc-feed{margin-top:20px;}
.soc-event{background:#0a0a0a;padding:12px;margin:10px 0;border-radius:10px;}
</style>

{% endblock %}
