<!DOCTYPE html>
<html>
<head>
<style>
body{
background:linear-gradient(135deg,#0a0a0a,#1a0033);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.card{
background:#111;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px #8a4fff;
}
input{
width:100%;
padding:10px;
margin:10px 0;
background:#222;
border:none;
color:white;
}
button{
width:100%;
padding:10px;
background:#8a4fff;
border:none;
color:white;
}
</style>
</head>

<body>
<div class="card">
<h2>AI Threat Detector</h2>

<form method="post" action="/login">
<input name="username">
<input name="password" type="password">
<button>Login</button>
</form>

</div>
</body>
</html>
